services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-dev
    environment:
        VITE_GIT_COMMIT: ${VITE_GIT_COMMIT}
        VITE_GIT_BRANCH: ${VITE_GIT_BRANCH}
        VITE_BUILD_TIME: ${VITE_BUILD_TIME}

    volumes:
      - ./frontend:/app
      - /app/node_modules

    ports:
      - 5173:5173

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-dev

    volumes:
      - ./backend:/app
      - /app/.venv

    ports:
      - 8000:8000
